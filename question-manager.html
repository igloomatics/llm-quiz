<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题目管理器</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dragging {
            opacity: 0.5;
        }
        .markdown-content h2 {
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 1em;
            margin-bottom: 0.5em;
        }
        .markdown-content h3 {
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 0.8em;
            margin-bottom: 0.4em;
        }
        .markdown-content code {
            background: #f3f4f6;
            padding: 0.2em 0.4em;
            border-radius: 0.25em;
            font-family: monospace;
        }
        .markdown-content pre {
            background: #1f2937;
            color: #f9fafb;
            padding: 1em;
            border-radius: 0.5em;
            overflow-x: auto;
            margin: 1em 0;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        // 从文件加载题目数据
        const loadQuestionsFromFile = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const content = e.target.result;
                        // 提取数组内容
                        const match = content.match(/const questionsData = (\[[\s\S]*\]);/);
                        if (match) {
                            const questions = eval(match[1]);
                            resolve(questions);
                        } else {
                            reject(new Error('无法解析文件'));
                        }
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.onerror = reject;
                reader.readAsText(file);
            });
        };

        // 导出为questions.js文件
        const exportToFile = (questions) => {
            const content = `const questionsData = ${JSON.stringify(questions, null, 4)};\n`;
            const blob = new Blob([content], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'questions.js';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        // 主应用组件
        function QuestionManager() {
            const [questions, setQuestions] = useState([]);
            const [filteredQuestions, setFilteredQuestions] = useState([]);
            const [selectedQuestion, setSelectedQuestion] = useState(null);
            const [isEditing, setIsEditing] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterTopic, setFilterTopic] = useState('');
            const [filterDifficulty, setFilterDifficulty] = useState('');
            const [filterType, setFilterType] = useState('');
            const [draggedIndex, setDraggedIndex] = useState(null);

            // 应用筛选
            useEffect(() => {
                let filtered = questions;
                
                if (searchTerm) {
                    filtered = filtered.filter(q => 
                        q.question.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        (q.explanation && q.explanation.toLowerCase().includes(searchTerm.toLowerCase()))
                    );
                }
                
                if (filterTopic) {
                    filtered = filtered.filter(q => q.topic === filterTopic);
                }
                
                if (filterDifficulty) {
                    filtered = filtered.filter(q => q.difficulty === filterDifficulty);
                }
                
                if (filterType) {
                    filtered = filtered.filter(q => q.type === filterType);
                }
                
                setFilteredQuestions(filtered);
            }, [questions, searchTerm, filterTopic, filterDifficulty, filterType]);

            // 获取所有唯一的主题、难度、类型
            const topics = [...new Set(questions.map(q => q.topic))];
            const difficulties = [...new Set(questions.map(q => q.difficulty))];
            const types = [...new Set(questions.map(q => q.type))];

            // 加载文件
            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    try {
                        const loadedQuestions = await loadQuestionsFromFile(file);
                        setQuestions(loadedQuestions);
                        alert(`成功加载 ${loadedQuestions.length} 道题目！`);
                    } catch (error) {
                        alert('加载文件失败：' + error.message);
                    }
                }
            };

            // 导出文件
            const handleExport = () => {
                exportToFile(questions);
            };

            // 新增题目
            const handleAdd = () => {
                const newQuestion = {
                    id: Math.max(...questions.map(q => q.id), 0) + 1,
                    type: '选择',
                    topic: 'Transformer入门',
                    difficulty: 'easy',
                    question: '新题目',
                    options: ['A. 选项1', 'B. 选项2', 'C. 选项3', 'D. 选项4'],
                    correct: 0,
                    explanation: '解释内容'
                };
                setSelectedQuestion(newQuestion);
                setIsEditing(true);
            };

            // 删除题目
            const handleDelete = (id) => {
                if (confirm('确定要删除这道题目吗？')) {
                    setQuestions(questions.filter(q => q.id !== id));
                    if (selectedQuestion?.id === id) {
                        setSelectedQuestion(null);
                    }
                }
            };

            // 编辑题目
            const handleEdit = (question) => {
                setSelectedQuestion({ ...question });
                setIsEditing(true);
            };

            // 保存编辑
            const handleSave = () => {
                if (questions.find(q => q.id === selectedQuestion.id)) {
                    // 更新现有题目
                    setQuestions(questions.map(q => 
                        q.id === selectedQuestion.id ? selectedQuestion : q
                    ));
                } else {
                    // 添加新题目
                    setQuestions([...questions, selectedQuestion]);
                }
                setIsEditing(false);
            };

            // 取消编辑
            const handleCancel = () => {
                setIsEditing(false);
                setSelectedQuestion(null);
            };

            // 上移
            const handleMoveUp = (index) => {
                if (index > 0) {
                    const newQuestions = [...questions];
                    [newQuestions[index - 1], newQuestions[index]] = 
                    [newQuestions[index], newQuestions[index - 1]];
                    setQuestions(newQuestions);
                }
            };

            // 下移
            const handleMoveDown = (index) => {
                if (index < questions.length - 1) {
                    const newQuestions = [...questions];
                    [newQuestions[index], newQuestions[index + 1]] = 
                    [newQuestions[index + 1], newQuestions[index]];
                    setQuestions(newQuestions);
                }
            };

            // 拖拽开始
            const handleDragStart = (index) => {
                setDraggedIndex(index);
            };

            // 拖拽结束
            const handleDrop = (targetIndex) => {
                if (draggedIndex === null || draggedIndex === targetIndex) return;
                
                const newQuestions = [...questions];
                const [removed] = newQuestions.splice(draggedIndex, 1);
                newQuestions.splice(targetIndex, 0, removed);
                setQuestions(newQuestions);
                setDraggedIndex(null);
            };

            return (
                <div className="min-h-screen p-6">
                    <div className="max-w-7xl mx-auto">
                        <h1 className="text-3xl font-bold mb-6 text-gray-800">📚 题目管理器</h1>
                        
                        {/* 工具栏 */}
                        <div className="bg-white rounded-lg shadow p-4 mb-6">
                            <div className="flex flex-wrap gap-4 items-center">
                                <label className="flex items-center gap-2 bg-blue-500 text-white px-4 py-2 rounded cursor-pointer hover:bg-blue-600">
                                    <span>📁 加载文件</span>
                                    <input 
                                        type="file" 
                                        accept=".js"
                                        onChange={handleFileUpload}
                                        className="hidden"
                                    />
                                </label>
                                
                                <button 
                                    onClick={handleExport}
                                    disabled={questions.length === 0}
                                    className="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600 disabled:bg-gray-300"
                                >
                                    💾 导出文件
                                </button>
                                
                                <button 
                                    onClick={handleAdd}
                                    className="bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-600"
                                >
                                    ➕ 新增题目
                                </button>
                                
                                <div className="ml-auto text-gray-600">
                                    共 {questions.length} 题 | 筛选后 {filteredQuestions.length} 题
                                </div>
                            </div>
                        </div>

                        {/* 筛选栏 */}
                        {questions.length > 0 && (
                            <div className="bg-white rounded-lg shadow p-4 mb-6">
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <input
                                        type="text"
                                        placeholder="🔍 搜索题目或解释..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        className="border rounded px-3 py-2"
                                    />
                                    
                                    <select
                                        value={filterTopic}
                                        onChange={(e) => setFilterTopic(e.target.value)}
                                        className="border rounded px-3 py-2"
                                    >
                                        <option value="">全部主题</option>
                                        {topics.map(topic => (
                                            <option key={topic} value={topic}>{topic}</option>
                                        ))}
                                    </select>
                                    
                                    <select
                                        value={filterDifficulty}
                                        onChange={(e) => setFilterDifficulty(e.target.value)}
                                        className="border rounded px-3 py-2"
                                    >
                                        <option value="">全部难度</option>
                                        {difficulties.map(diff => (
                                            <option key={diff} value={diff}>{diff}</option>
                                        ))}
                                    </select>
                                    
                                    <select
                                        value={filterType}
                                        onChange={(e) => setFilterType(e.target.value)}
                                        className="border rounded px-3 py-2"
                                    >
                                        <option value="">全部类型</option>
                                        {types.map(type => (
                                            <option key={type} value={type}>{type}</option>
                                        ))}
                                    </select>
                                </div>
                                
                                {(searchTerm || filterTopic || filterDifficulty || filterType) && (
                                    <button
                                        onClick={() => {
                                            setSearchTerm('');
                                            setFilterTopic('');
                                            setFilterDifficulty('');
                                            setFilterType('');
                                        }}
                                        className="mt-3 text-sm text-blue-600 hover:text-blue-800"
                                    >
                                        🔄 清除筛选
                                    </button>
                                )}
                            </div>
                        )}

                        {/* 主内容区 */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            {/* 左侧：题目列表 */}
                            <div className="bg-white rounded-lg shadow p-4">
                                <h2 className="text-xl font-bold mb-4">题目列表</h2>
                                <div className="space-y-2 max-h-[70vh] overflow-y-auto">
                                    {filteredQuestions.length === 0 ? (
                                        <div className="text-center text-gray-500 py-8">
                                            {questions.length === 0 
                                                ? '请加载 questions.js 文件'
                                                : '没有符合条件的题目'}
                                        </div>
                                    ) : (
                                        filteredQuestions.map((q, index) => {
                                            const originalIndex = questions.findIndex(oq => oq.id === q.id);
                                            return (
                                                <div
                                                    key={q.id}
                                                    draggable
                                                    onDragStart={() => handleDragStart(originalIndex)}
                                                    onDragOver={(e) => e.preventDefault()}
                                                    onDrop={() => handleDrop(originalIndex)}
                                                    className={`border rounded p-3 hover:bg-gray-50 cursor-move ${
                                                        selectedQuestion?.id === q.id ? 'bg-blue-50 border-blue-500' : ''
                                                    } ${draggedIndex === originalIndex ? 'dragging' : ''}`}
                                                    onClick={() => {
                                                        setSelectedQuestion(q);
                                                        setIsEditing(false);
                                                    }}
                                                >
                                                    <div className="flex items-start justify-between">
                                                        <div className="flex-1">
                                                            <div className="flex items-center gap-2 mb-1">
                                                                <span className="text-xs bg-gray-200 px-2 py-1 rounded">
                                                                    ID: {q.id}
                                                                </span>
                                                                <span className="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded">
                                                                    {q.type}
                                                                </span>
                                                                <span className={`text-xs px-2 py-1 rounded ${
                                                                    q.difficulty === 'easy' ? 'bg-green-100 text-green-800' :
                                                                    q.difficulty === 'medium' ? 'bg-yellow-100 text-yellow-800' :
                                                                    q.difficulty === 'hard' ? 'bg-red-100 text-red-800' :
                                                                    'bg-purple-100 text-purple-800'
                                                                }`}>
                                                                    {q.difficulty}
                                                                </span>
                                                            </div>
                                                            <div className="text-sm font-medium text-gray-700 mb-1">
                                                                {q.topic}
                                                            </div>
                                                            <div className="text-sm text-gray-600 line-clamp-2">
                                                                {q.question}
                                                            </div>
                                                        </div>
                                                        <div className="flex gap-1 ml-2">
                                                            <button
                                                                onClick={(e) => {
                                                                    e.stopPropagation();
                                                                    handleMoveUp(originalIndex);
                                                                }}
                                                                className="text-gray-500 hover:text-blue-600"
                                                                title="上移"
                                                            >
                                                                ⬆️
                                                            </button>
                                                            <button
                                                                onClick={(e) => {
                                                                    e.stopPropagation();
                                                                    handleMoveDown(originalIndex);
                                                                }}
                                                                className="text-gray-500 hover:text-blue-600"
                                                                title="下移"
                                                            >
                                                                ⬇️
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>

                            {/* 右侧：详情/编辑区 */}
                            <div className="bg-white rounded-lg shadow p-4">
                                <h2 className="text-xl font-bold mb-4">
                                    {isEditing ? '编辑题目' : '题目详情'}
                                </h2>
                                
                                {!selectedQuestion ? (
                                    <div className="text-center text-gray-500 py-8">
                                        👈 请选择一道题目
                                    </div>
                                ) : isEditing ? (
                                    <EditForm 
                                        question={selectedQuestion}
                                        onChange={setSelectedQuestion}
                                        onSave={handleSave}
                                        onCancel={handleCancel}
                                    />
                                ) : (
                                    <QuestionDetail 
                                        question={selectedQuestion}
                                        onEdit={handleEdit}
                                        onDelete={handleDelete}
                                    />
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // 题目详情组件
        function QuestionDetail({ question, onEdit, onDelete }) {
            return (
                <div className="space-y-4 max-h-[70vh] overflow-y-auto">
                    <div className="flex justify-end gap-2">
                        <button
                            onClick={() => onEdit(question)}
                            className="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600"
                        >
                            ✏️ 编辑
                        </button>
                        <button
                            onClick={() => onDelete(question.id)}
                            className="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600"
                        >
                            🗑️ 删除
                        </button>
                    </div>
                    
                    <div>
                        <label className="text-sm font-bold text-gray-700">ID</label>
                        <div className="mt-1 text-gray-900">{question.id}</div>
                    </div>
                    
                    <div>
                        <label className="text-sm font-bold text-gray-700">主题</label>
                        <div className="mt-1 text-gray-900">{question.topic}</div>
                    </div>
                    
                    <div className="grid grid-cols-2 gap-4">
                        <div>
                            <label className="text-sm font-bold text-gray-700">类型</label>
                            <div className="mt-1 text-gray-900">{question.type}</div>
                        </div>
                        <div>
                            <label className="text-sm font-bold text-gray-700">难度</label>
                            <div className="mt-1 text-gray-900">{question.difficulty}</div>
                        </div>
                    </div>
                    
                    <div>
                        <label className="text-sm font-bold text-gray-700">题目</label>
                        <div className="mt-1 text-gray-900 whitespace-pre-wrap">{question.question}</div>
                    </div>
                    
                    {question.options && (
                        <div>
                            <label className="text-sm font-bold text-gray-700">选项</label>
                            <div className="mt-1 space-y-1">
                                {question.options.map((opt, idx) => (
                                    <div 
                                        key={idx}
                                        className={`p-2 rounded ${
                                            idx === question.correct 
                                                ? 'bg-green-100 border border-green-500' 
                                                : 'bg-gray-50'
                                        }`}
                                    >
                                        {opt} {idx === question.correct && '✓'}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                    
                    {question.answer && (
                        <div>
                            <label className="text-sm font-bold text-gray-700">答案</label>
                            <div className="mt-1 text-gray-900 whitespace-pre-wrap">{question.answer}</div>
                        </div>
                    )}
                    
                    {question.explanation && (
                        <div>
                            <label className="text-sm font-bold text-gray-700">解释</label>
                            <div className="mt-1 text-gray-900 whitespace-pre-wrap bg-gray-50 p-3 rounded markdown-content">
                                {question.explanation}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // 编辑表单组件
        function EditForm({ question, onChange, onSave, onCancel }) {
            const handleChange = (field, value) => {
                onChange({ ...question, [field]: value });
            };

            const handleOptionChange = (index, value) => {
                const newOptions = [...question.options];
                newOptions[index] = value;
                onChange({ ...question, options: newOptions });
            };

            return (
                <div className="space-y-4 max-h-[70vh] overflow-y-auto">
                    <div className="flex justify-end gap-2">
                        <button
                            onClick={onSave}
                            className="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600"
                        >
                            💾 保存
                        </button>
                        <button
                            onClick={onCancel}
                            className="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600"
                        >
                            ❌ 取消
                        </button>
                    </div>
                    
                    <div>
                        <label className="text-sm font-bold text-gray-700">ID</label>
                        <input
                            type="number"
                            value={question.id}
                            onChange={(e) => handleChange('id', parseInt(e.target.value))}
                            className="mt-1 w-full border rounded px-3 py-2"
                        />
                    </div>
                    
                    <div>
                        <label className="text-sm font-bold text-gray-700">主题</label>
                        <input
                            type="text"
                            value={question.topic}
                            onChange={(e) => handleChange('topic', e.target.value)}
                            className="mt-1 w-full border rounded px-3 py-2"
                        />
                    </div>
                    
                    <div className="grid grid-cols-2 gap-4">
                        <div>
                            <label className="text-sm font-bold text-gray-700">类型</label>
                            <select
                                value={question.type}
                                onChange={(e) => handleChange('type', e.target.value)}
                                className="mt-1 w-full border rounded px-3 py-2"
                            >
                                <option value="选择">选择</option>
                                <option value="简答">简答</option>
                                <option value="简介">简介</option>
                            </select>
                        </div>
                        <div>
                            <label className="text-sm font-bold text-gray-700">难度</label>
                            <select
                                value={question.difficulty}
                                onChange={(e) => handleChange('difficulty', e.target.value)}
                                className="mt-1 w-full border rounded px-3 py-2"
                            >
                                <option value="easy">easy</option>
                                <option value="medium">medium</option>
                                <option value="hard">hard</option>
                                <option value="简介">简介</option>
                            </select>
                        </div>
                    </div>
                    
                    <div>
                        <label className="text-sm font-bold text-gray-700">题目</label>
                        <textarea
                            value={question.question}
                            onChange={(e) => handleChange('question', e.target.value)}
                            className="mt-1 w-full border rounded px-3 py-2 h-24"
                        />
                    </div>
                    
                    {question.type === '选择' && (
                        <>
                            <div>
                                <label className="text-sm font-bold text-gray-700">选项</label>
                                <div className="mt-1 space-y-2">
                                    {question.options?.map((opt, idx) => (
                                        <input
                                            key={idx}
                                            type="text"
                                            value={opt}
                                            onChange={(e) => handleOptionChange(idx, e.target.value)}
                                            className="w-full border rounded px-3 py-2"
                                        />
                                    ))}
                                </div>
                            </div>
                            
                            <div>
                                <label className="text-sm font-bold text-gray-700">正确答案（索引）</label>
                                <select
                                    value={question.correct}
                                    onChange={(e) => handleChange('correct', parseInt(e.target.value))}
                                    className="mt-1 w-full border rounded px-3 py-2"
                                >
                                    {question.options?.map((opt, idx) => (
                                        <option key={idx} value={idx}>
                                            {idx} - {opt}
                                        </option>
                                    ))}
                                </select>
                            </div>
                        </>
                    )}
                    
                    {question.type === '简答' && (
                        <div>
                            <label className="text-sm font-bold text-gray-700">答案</label>
                            <textarea
                                value={question.answer || ''}
                                onChange={(e) => handleChange('answer', e.target.value)}
                                className="mt-1 w-full border rounded px-3 py-2 h-24"
                            />
                        </div>
                    )}
                    
                    <div>
                        <label className="text-sm font-bold text-gray-700">解释</label>
                        <textarea
                            value={question.explanation}
                            onChange={(e) => handleChange('explanation', e.target.value)}
                            className="mt-1 w-full border rounded px-3 py-2 h-48"
                        />
                    </div>
                </div>
            );
        }

        // 渲染应用
        ReactDOM.render(<QuestionManager />, document.getElementById('root'));
    </script>
</body>
</html>
